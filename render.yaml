services:
  - type: web
    name: neotravel-api
    env: node
    region: frankfurt
    plan: free
    branch: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_SECRET
        sync: false
