services:
  - type: web
    name: neotravel-api
    env: node
    region: frankfurt
    plan: free
    branch: backend_migration
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: EMAIL_PROVIDER
        value: brevo
      - key: BOOTSTRAP_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
